<svg width="1200" height="1000" viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1200" height="1000" fill="#1a0e0c" rx="15"/>
    
    <!-- Header/Title Area -->
    <rect width="1200" height="100" fill="#701705" rx="15"/>
    <text x="600" y="60" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="36" font-weight="bold">Arquitectura de Sitio: CCH Portal Funcional</text>
    <text x="600" y="85" text-anchor="middle" fill="#cc998f" font-family="Lexend, sans-serif" font-size="14">Mapa Detallado de Archivos y Navegación</text>

    <!-- Definitions -->
    <defs>
        <marker id="arrow" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#bc4c39" />
        </marker>
        <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="4" />
            <feOffset dx="3" dy="3" result="offsetblur" />
            <feComponentTransfer><feFuncA type="linear" slope="0.4" /></feComponentTransfer>
            <feMerge><feMergeNode /><feMergeNode in="SourceGraphic" /></feMerge>
        </filter>
    </defs>

    <!-- LEGEND -->
    <g transform="translate(40, 120)">
        <rect width="220" height="120" rx="10" fill="#2d1b18" stroke="#701705"/>
        <text x="110" y="25" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="14" font-weight="bold">Leyenda</text>
        <rect x="20" y="45" width="15" height="15" fill="#701705"/> <text x="45" y="57" fill="#cc998f" font-family="Lexend, sans-serif" font-size="12">Público / Info</text>
        <rect x="20" y="70" width="15" height="15" fill="#9C2007"/> <text x="45" y="82" fill="#cc998f" font-family="Lexend, sans-serif" font-size="12">Auth / Registro</text>
        <rect x="20" y="95" width="15" height="15" fill="#bc4c39"/> <text x="45" y="107" fill="#cc998f" font-family="Lexend, sans-serif" font-size="12">Funcional / Dashboard</text>
    </g>

    <!-- CENTRAL ASSETS (The Glue) -->
    <g transform="translate(480, 150)" filter="url(#cardShadow)">
        <rect width="240" height="80" rx="10" fill="#3d2b28" stroke="#9C2007" stroke-width="2"/>
        <text x="120" y="30" text-anchor="middle" fill="#f8f6f5" font-family="Lexend, sans-serif" font-size="16" font-weight="bold">CORE ASSETS</text>
        <text x="120" y="55" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="12">assets/js/main.js</text>
        <text x="120" y="70" text-anchor="middle" fill="#cc998f" font-family="Lexend, sans-serif" font-size="10">(Inyecta Header / Footer / Auth)</text>
    </g>

    <!-- SECTION 1: PUBLIC ACCESS -->
    <g transform="translate(300, 280)">
        <text x="100" y="-10" text-anchor="middle" fill="#701705" font-family="Lexend, sans-serif" font-size="18" font-weight="bold">ZONA PÚBLICA</text>
        <rect width="200" height="50" rx="5" fill="#701705" filter="url(#cardShadow)"/>
        <text x="100" y="30" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="14">index.html (Home)</text>
        
        <rect y="70" width="200" height="50" rx="5" fill="#701705" filter="url(#cardShadow)"/>
        <text x="100" y="100" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="14">convocatoria.html</text>

        <rect y="140" width="200" height="50" rx="5" fill="#701705" filter="url(#cardShadow)"/>
        <text x="100" y="170" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="14">faq.html / guias.html</text>
    </g>

    <!-- SECTION 2: AUTHENTICATION -->
    <g transform="translate(650, 280)">
        <text x="100" y="-10" text-anchor="middle" fill="#9C2007" font-family="Lexend, sans-serif" font-size="18" font-weight="bold">ACCESO Y REGISTRO</text>
        <rect width="200" height="50" rx="5" fill="#9C2007" filter="url(#cardShadow)"/>
        <text x="100" y="30" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="14">login.html</text>

        <rect y="70" width="200" height="50" rx="5" fill="#9C2007" filter="url(#cardShadow)"/>
        <text x="100" y="100" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="14">registro-usuario.html</text>

        <rect y="140" width="200" height="50" rx="5" fill="#9C2007" filter="url(#cardShadow)"/>
        <text x="100" y="170" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="14">recuperar-password.html</text>
    </g>

    <!-- SECTION 3: RESEARCHER PORTAL -->
    <g transform="translate(50, 550)">
        <text x="250" y="-20" text-anchor="middle" fill="#bc4c39" font-family="Lexend, sans-serif" font-size="20" font-weight="bold">MÓDULO DE INVESTIGADOR (Researcher)</text>
        
        <rect width="180" height="60" rx="5" fill="#bc4c39" filter="url(#cardShadow)"/>
        <text x="90" y="35" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="14" font-weight="bold">dashboard.html</text>

        <!-- WIZARD -->
        <g transform="translate(230, 0)">
            <rect width="500" height="150" rx="10" fill="#2d1b18" stroke="#bc4c39" stroke-dasharray="5,5"/>
            <text x="250" y="25" text-anchor="middle" fill="#cc998f" font-family="Lexend, sans-serif" font-size="12">REGISTRO DE PROYECTO (Wizard)</text>
            
            <rect x="20" y="40" width="140" height="40" rx="5" fill="#701705"/>
            <text x="90" y="65" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="11">registro.html (P1)</text>

            <rect x="180" y="40" width="140" height="40" rx="5" fill="#701705"/>
            <text x="250" y="65" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="11">registro-paso2.html</text>

            <rect x="340" y="40" width="140" height="40" rx="5" fill="#701705"/>
            <text x="410" y="65" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="11">registro-paso3.html</text>

            <rect x="100" y="95" width="140" height="40" rx="5" fill="#701705"/>
            <text x="170" y="120" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="11">registro-paso4.html</text>

            <rect x="260" y="95" width="140" height="40" rx="5" fill="#9C2007"/>
            <text x="330" y="120" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="11">registro-exito.html</text>
        </g>
    </g>

    <!-- SECTION 4: ADMIN MODULE -->
    <g transform="translate(800, 550)">
        <text x="150" y="-20" text-anchor="middle" fill="#bc4c39" font-family="Lexend, sans-serif" font-size="20" font-weight="bold">MÓDULO ADMIN</text>
        
        <rect width="250" height="60" rx="5" fill="#bc4c39" filter="url(#cardShadow)"/>
        <text x="125" y="35" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="14" font-weight="bold">admin-dashboard.html</text>

        <rect y="80" width="250" height="45" rx="5" fill="#3d2b28" stroke="#bc4c39"/>
        <text x="125" y="108" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="12">admin-proyectos.html</text>

        <rect y="135" width="250" height="45" rx="5" fill="#3d2b28" stroke="#bc4c39"/>
        <text x="125" y="163" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="12">admin-usuarios.html</text>

        <rect y="190" width="250" height="45" rx="5" fill="#3d2b28" stroke="#bc4c39"/>
        <text x="125" y="218" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="12">admin-evaluacion.html</text>
    </g>

    <!-- INTER-SECTION CONNECTORS (Partial Mapping) -->
    <!-- From Core to sections -->
    <path d="M600 230 L600 280" stroke="#9C2007" stroke-width="2" marker-end="url(#arrow)"/>
    <path d="M480 190 L200 190 L200 550" stroke="#9C2007" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <path d="M720 190 L1000 190 L1000 550" stroke="#9C2007" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

    <!-- From Login to Dashboard -->
    <path d="M750 330 L750 510 L230 510 L230 550" stroke="#bc4c39" stroke-width="2" fill="none" marker-end="url(#arrow)"/>
    <path d="M750 330 L750 510 L925 510 L925 550" stroke="#bc4c39" stroke-width="2" fill="none" marker-end="url(#arrow)"/>

    <!-- Footer Credit -->
    <text x="600" y="980" text-anchor="middle" fill="#cc998f" font-family="Lexend, sans-serif" font-size="12">Mapa de Sitio Generado para Revisiones y Mejoras Técnicas - 2024</text>
</svg>
