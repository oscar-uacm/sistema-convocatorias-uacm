<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>UACM - Portal de Proyectos | Inicio de Sesión</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@300;400;500;600&amp;display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/shared.css">
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#701705",
                        "uacm-red": "#9C2007",
                        "background-light": "#f8f6f5",
                        "background-dark": "#221310",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .institutional-pattern {
            background-color: #9C2007;
            background-image: url(https://lh3.googleusercontent.com/aida-public/AB6AXuACsFJpjtBUEFy3TI3Qor2OucBZTNL33WiQaOmvsO0IRW36CNQ1lM-0U2aRB2MwibFcriFJ6XZqd-rAWzK8zZ7s4ozfzDesEu4IY4uGS16IWW-tiPpcQgEwnURRpE3sdIVpBsoBkExVGDXWMMWf8LUAFGTt79ctNf5nukqmlSSXW75lwZ7zNkS3_PLXVrFxjEBGxWWIKgKGvtNXj4-9a_5OrhCtBCOgr1DeKoQSRPBsrUuT0oKL88XQrdpj7N9OC8n3xkhciSZ7ffgb);
            /* Subtle pattern overlay to give it an institutional feel */
        }

        .login-card {
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1)
        }

        .btn-primary-hover:hover {
            background-color: white !important;
            color: black !important;
            border: 1px solid #701705
        }
    </style>
</head>

<body class="font-display bg-background-light dark:bg-background-dark text-[#1c0f0d]">
    <!-- Main Container with Institutional Background -->
    <div class="relative min-h-screen w-full flex flex-col items-center justify-center institutional-pattern p-6">
        <!-- Header / Logo Overlay (Optional for top branding) -->
        <a href="index.html" class="absolute top-8 left-8 hidden lg:flex items-center gap-3 text-white">
            <span class="material-symbols-outlined text-4xl">account_balance</span>
            <div>
                <h1 class="text-xl font-bold leading-none tracking-tight">UACM</h1>
                <p class="text-xs opacity-80 uppercase tracking-widest">Colegio de Ciencias y Humanidades</p>
            </div>
        </a>
        <!-- Central Login Card -->
        <div class="w-full max-w-[480px] bg-white dark:bg-[#2d1b18] rounded-xl overflow-hidden login-card p-8 md:p-12">
            <!-- Logo Section -->
            <div class="flex flex-col items-center mb-10">
                <div class="bg-primary/5 p-4 rounded-full mb-4">
                    <span class="material-symbols-outlined text-primary text-5xl">school</span>
                </div>
                <h2 class="text-2xl font-bold text-center text-[#1c0f0d] dark:text-white">Portal de Proyectos</h2>
                <p class="text-[#701705] text-sm font-medium mt-1">Colegio de Ciencias y Humanidades</p>
            </div>
            <!-- Login Form -->
            <form class="space-y-6">
                <!-- Institutional Email Field -->
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-[#1c0f0d] dark:text-gray-200 ml-1" for="email">
                        Correo Institucional
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span
                                class="material-symbols-outlined text-primary/60 group-focus-within:text-primary transition-colors">mail</span>
                        </div>
                        <input
                            class="block w-full pl-12 pr-4 py-3.5 bg-gray-50 dark:bg-primary/10 border border-gray-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-base placeholder:text-gray-400"
                            id="email" name="email" placeholder="ejemplo@uacm.edu.mx" required="" type="email" />
                    </div>
                </div>
                <!-- Password Field -->
                <div class="flex flex-col gap-2">
                    <label class="text-sm font-semibold text-[#1c0f0d] dark:text-gray-200 ml-1" for="password">
                        Contraseña
                    </label>
                    <div class="relative group">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <span
                                class="material-symbols-outlined text-primary/60 group-focus-within:text-primary transition-colors">lock</span>
                        </div>
                        <input
                            class="block w-full pl-12 pr-12 py-3.5 bg-gray-50 dark:bg-primary/10 border border-gray-200 dark:border-primary/20 rounded-lg focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none text-base placeholder:text-gray-400"
                            id="password" name="password" placeholder="••••••••" required="" type="password" />
                        <button
                            class="absolute inset-y-0 right-0 pr-4 flex items-center text-gray-400 hover:text-primary"
                            type="button">
                            <span class="material-symbols-outlined text-xl">visibility</span>
                        </button>
                    </div>
                </div>
                <!-- Remember Me & Forgot Password (Visual only) -->
                <div class="flex items-center justify-between py-1">
                    <label class="flex items-center gap-2 cursor-pointer">
                        <input class="rounded border-gray-300 text-primary focus:ring-primary h-4 w-4"
                            type="checkbox" />
                        <span class="text-xs text-gray-600 dark:text-gray-400">Recordarme</span>
                    </label>
                    <a class="text-xs font-medium text-primary hover:underline"
                        href="recuperar-password.html">¿Olvidaste tu contraseña?</a>
                </div>
                <!-- Submit Button -->
                <button onclick="window.location.href='dashboard.html'"
                    class="w-full py-4 bg-primary text-white font-bold rounded-lg shadow-lg btn-primary-hover transition-all duration-200 flex items-center justify-center gap-2"
                    type="button">
                    <span>Iniciar Sesión</span>
                    <span class="material-symbols-outlined text-xl">login</span>
                </button>
            </form>
            <!-- Footer Links -->
            <div class="mt-10 pt-8 border-t border-gray-100 dark:border-white/10 flex flex-col gap-4 text-center">
                <a class="text-sm font-medium text-gray-600 dark:text-gray-300 hover:text-primary transition-colors"
                    href="recuperar-password.html">
                    Recuperar Contraseña
                </a>
                <div class="flex items-center justify-center gap-2 text-xs text-gray-400">
                    <span class="h-px w-12 bg-gray-200 dark:bg-white/10"></span>
                    <span>¿No tienes cuenta?</span>
                    <span class="h-px w-12 bg-gray-200 dark:bg-white/10"></span>
                </div>
                <a class="text-sm font-bold text-primary hover:text-uacm-red transition-colors"
                    href="registro-usuario.html">
                    Registro de Nuevo Usuario
                </a>
            </div>
        </div>
        <!-- Desktop Navigation Help Links -->
        <div class="mt-8 flex gap-8 text-white/70 text-sm font-medium">
            <a class="hover:text-white transition-colors" href="#">Ayuda</a>
            <a class="hover:text-white transition-colors" href="#">Convocatorias</a>
            <a class="hover:text-white transition-colors" href="#">Privacidad</a>
        </div>
        <!-- Map/Location Representation (Visual Decoration) -->
        <div class="fixed bottom-4 right-4 text-white/30 pointer-events-none" data-location="Mexico City" style="">
            <span class="text-[10px] uppercase tracking-widest">UACM - Ciudad de México</span>
        </div>
    </div>
    <div id="footer-root"></div>
    <script src="assets/js/main.js"></script>

</body>

</html>
