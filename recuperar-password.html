<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>UACM - Recuperar Contraseña</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#701705",
                        "institutional-red": "#9C2007",
                        "background-light": "#f8f6f5",
                        "background-dark": "#221310",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        .institutional-pattern {
            background-image: radial-gradient(#ffffff15 1px, transparent 1px);
            background-size: 20px 20px;
        }
    </style>
</head>

<body class="font-display bg-background-light dark:bg-background-dark text-[#1c0f0d]">
    <!-- Main Wrapper with Deep Red Background and Pattern -->
    <div
        class="relative flex min-h-screen w-full flex-col items-center justify-center bg-institutional-red p-6 overflow-hidden">
        <!-- Decorative Background Pattern -->
        <div class="absolute inset-0 institutional-pattern opacity-30 pointer-events-none"></div>
        <!-- Center Card Container -->
        <div class="relative w-full max-w-[480px] z-10">
            <!-- Branding / Logo Area -->
            <div class="flex flex-col items-center mb-8">
                <div class="bg-white p-4 rounded-full shadow-xl mb-4">
                    <!-- Placeholder for UACM Logo -->
                    <div class="size-16 flex items-center justify-center text-primary">
                        <svg class="w-full h-full" fill="currentColor" viewbox="0 0 48 48"
                            xmlns="http://www.w3.org/2000/svg">
                            <path d="M44 4H30.6666V17.3334H17.3334V30.6666H4V44H44V4Z"></path>
                        </svg>
                    </div>
                </div>
                <h1 class="text-white text-2xl font-bold tracking-tight text-center">Colegio de Ciencias y Humanidades
                </h1>
                <p class="text-white/80 text-sm font-medium">Portal de Proyectos UACM</p>
            </div>
            <!-- Recovery Card -->
            <div class="bg-white dark:bg-background-dark rounded-xl shadow-2xl p-8 md:p-10 border border-white/10">
                <div class="mb-8 text-center">
                    <h2 class="text-2xl font-bold text-primary dark:text-white mb-3">Recuperar Contraseña</h2>
                    <p class="text-[#9d5648] dark:text-gray-400 text-sm leading-relaxed">
                        Ingresa tu correo institucional para recibir las instrucciones de recuperación en tu bandeja de
                        entrada.
                    </p>
                </div>
                <form class="space-y-6">
                    <!-- Email Input Field -->
                    <div class="space-y-2">
                        <label class="block text-sm font-semibold text-[#1c0f0d] dark:text-gray-200" for="email">
                            Correo Institucional
                        </label>
                        <div class="relative">
                            <div
                                class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none text-[#9d5648]">
                                <span class="material-symbols-outlined text-xl">mail</span>
                            </div>
                            <input
                                class="block w-full pl-11 pr-4 py-4 rounded-lg border border-[#e9d2ce] bg-[#fcf9f8] dark:bg-background-dark dark:border-primary/30 text-[#1c0f0d] dark:text-white focus:ring-2 focus:ring-primary focus:border-primary transition-all placeholder:text-[#9d5648]/50"
                                id="email" name="email" placeholder="usuario@uacm.edu.mx" required="" type="email" />
                        </div>
                    </div>
                    <!-- Action Button -->
                    <button
                        class="group relative w-full flex items-center justify-center py-4 px-6 rounded-lg bg-primary text-white font-bold text-base transition-all hover:bg-white hover:text-black border-2 border-primary shadow-lg hover:shadow-xl active:scale-[0.98]"
                        type="submit">
                        <span class="truncate">Enviar Instrucciones</span>
                        <span
                            class="material-symbols-outlined ml-2 text-xl group-hover:translate-x-1 transition-transform">send</span>
                    </button>
                </form>
                <!-- Divider -->
                <div class="relative my-8">
                    <div aria-hidden="true" class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-[#f4e9e7] dark:border-white/10"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase">
                        <span
                            class="bg-white dark:bg-background-dark px-2 text-[#9d5648] dark:text-gray-500 font-medium tracking-wider">O
                            también</span>
                    </div>
                </div>
                <!-- Back to Login Link -->
                <div class="text-center">
                    <a class="inline-flex items-center gap-2 text-primary dark:text-white/80 text-sm font-semibold hover:underline decoration-2 underline-offset-4 transition-colors"
                        href="login.html">
                        <span class="material-symbols-outlined text-lg">arrow_back</span>
                        Volver al Inicio de Sesión
                    </a>
                </div>
            </div>
            <!-- Security Notice Footer -->
            <div class="mt-8 flex items-center justify-center gap-2 text-white/60 text-xs">
                <span class="material-symbols-outlined text-sm">lock</span>
                <span>Conexión Segura de Grado Académico</span>
            </div>
        </div>
        <!-- Decorative Elements for Desktop -->
        <div class="hidden lg:block absolute bottom-10 left-10 opacity-20">
            <div class="w-64 h-64 border-8 border-white rounded-full"></div>
        </div>
        <div class="hidden lg:block absolute top-10 right-10 opacity-20">
            <div class="w-48 h-48 border-[16px] border-white/50 rotate-45"></div>
        </div>
    </div>
    <!-- Footer Copyright -->
    <div id="footer-root"></div>
    <script src="assets/js/main.js"></script>`n</body>

</html>
