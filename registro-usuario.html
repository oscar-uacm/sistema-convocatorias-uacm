<!DOCTYPE html>

<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>UACM Project Portal Registration</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <link
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
        rel="stylesheet" />
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#701705",
                        "uacm-red": "#9C2007",
                        "background-light": "#f8f6f5",
                        "background-dark": "#221310",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
    <style>
        body {
            font-family: 'Lexend', sans-serif;
        }

        .btn-primary-hover:hover {
            background-color: white !important;
            color: black !important;
            border: 1px solid #701705;
        }
    </style>
</head>

<body class="bg-uacm-red min-h-screen flex items-center justify-center p-6">
    <!-- Main Registration Card -->
    <div class="w-full max-w-[550px] bg-white rounded-xl shadow-2xl overflow-hidden flex flex-col">
        <!-- Header Section -->
        <div class="pt-10 pb-6 px-10 text-center">
            <div class="flex justify-center mb-6">
                <!-- UACM Logo Placeholder -->
                <div class="bg-primary/10 p-4 rounded-full">
                    <svg class="w-16 h-16 text-primary" fill="currentColor" viewbox="0 0 48 48"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M39.5563 34.1455V13.8546C39.5563 15.708 36.8773 17.3437 32.7927 18.3189C30.2914 18.916 27.263 19.2655 24 19.2655C20.737 19.2655 17.7086 18.916 15.2073 18.3189C11.1227 17.3437 8.44365 15.708 8.44365 13.8546V34.1455C8.44365 35.9988 11.1227 37.6346 15.2073 38.6098C17.7086 39.2069 20.737 39.5564 24 39.5564C27.263 39.5564 30.2914 39.2069 32.7927 38.6098C36.8773 37.6346 39.5563 35.9988 39.5563 34.1455Z">
                        </path>
                        <path clip-rule="evenodd"
                            d="M10.4485 13.8519C10.4749 13.9271 10.6203 14.246 11.379 14.7361C12.298 15.3298 13.7492 15.9145 15.6717 16.3735C18.0007 16.9296 20.8712 17.2655 24 17.2655C27.1288 17.2655 29.9993 16.9296 32.3283 16.3735C34.2508 15.9145 35.702 15.3298 36.621 14.7361C37.3796 14.246 37.5251 13.9271 37.5515 13.8519C37.5287 13.7876 37.4333 13.5973 37.0635 13.2931C36.5266 12.8516 35.6288 12.3647 34.343 11.9175C31.79 11.0295 28.1333 10.4437 24 10.4437C19.8667 10.4437 16.2099 11.0295 13.657 11.9175C12.3712 12.3647 11.4734 12.8516 10.9365 13.2931C10.5667 13.5973 10.4713 13.7876 10.4485 13.8519ZM37.5563 18.7877C36.3176 19.3925 34.8502 19.8839 33.2571 20.2642C30.5836 20.9025 27.3973 21.2655 24 21.2655C20.6027 21.2655 17.4164 20.9025 14.7429 20.2642C13.1498 19.8839 11.6824 19.3925 10.4436 18.7877V34.1275C10.4515 34.1545 10.5427 34.4867 11.379 35.027C12.298 35.6207 13.7492 36.2054 15.6717 36.6644C18.0007 37.2205 20.8712 37.5564 24 37.5564C27.1288 37.5564 29.9993 37.2205 32.3283 36.6644C34.2508 36.2054 35.702 35.6207 36.621 35.027C37.4573 34.4867 37.5485 34.1546 37.5563 34.1275V18.7877ZM41.5563 13.8546V34.1455C41.5563 36.1078 40.158 37.5042 38.7915 38.3869C37.3498 39.3182 35.4192 40.0389 33.2571 40.5551C30.5836 41.1934 27.3973 41.5564 24 41.5564C20.6027 41.5564 17.4164 41.1934 14.7429 40.5551C12.5808 40.0389 10.6502 39.3182 9.20848 38.3869C7.84205 37.5042 6.44365 36.1078 6.44365 34.1455L6.44365 13.8546C6.44365 12.2684 7.37223 11.0454 8.39581 10.2036C9.43325 9.3505 10.8137 8.67141 12.343 8.13948C15.4203 7.06909 19.5418 6.44366 24 6.44366C28.4582 6.44366 32.5797 7.06909 35.657 8.13948C37.1863 8.67141 38.5667 9.3505 39.6042 10.2036C40.6278 11.0454 41.5563 12.2684 41.5563 13.8546Z"
                            fill="currentColor" fill-rule="evenodd"></path>
                    </svg>
                </div>
            </div>
            <h1 class="text-2xl font-bold text-gray-900 tracking-tight">Registro de Usuarios</h1>
            <p class="text-primary font-medium mt-1">Portal de Proyectos CCH UACM</p>
            <p class="text-gray-500 text-sm mt-2">Crea tu cuenta institucional para acceder al sistema</p>
        </div>
        <!-- Registration Form -->
        <form class="px-10 pb-10 space-y-5">
            <!-- Full Name -->
            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">person</span>
                    Nombre Completo
                </label>
                <input
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-gray-400"
                    placeholder="Ej. Juan Pérez García" type="text" />
            </div>
            <!-- Institutional Email -->
            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">mail</span>
                    Correo Institucional
                </label>
                <div class="relative">
                    <input
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-gray-400"
                        placeholder="usuario@uacm.edu.mx" type="email" />
                    <div
                        class="absolute right-3 top-1/2 -translate-y-1/2 text-[10px] font-bold text-primary bg-primary/5 px-2 py-1 rounded">
                        OBLIGATORIO</div>
                </div>
            </div>
            <!-- ID / Employee Number -->
            <div class="space-y-1.5">
                <label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
                    <span class="material-symbols-outlined text-lg">badge</span>
                    Matrícula / Número de Empleado
                </label>
                <input
                    class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-gray-400"
                    placeholder="Ingrese su identificador oficial" type="text" />
            </div>
            <!-- Password Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
                        <span class="material-symbols-outlined text-lg">lock</span>
                        Contraseña
                    </label>
                    <input
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-gray-400"
                        placeholder="••••••••" type="password" />
                </div>
                <div class="space-y-1.5">
                    <label class="text-sm font-semibold text-gray-700 flex items-center gap-2">
                        <span class="material-symbols-outlined text-lg">verified_user</span>
                        Confirmar
                    </label>
                    <input
                        class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all outline-none placeholder:text-gray-400"
                        placeholder="••••••••" type="password" />
                </div>
            </div>
            <!-- Terms & Conditions (Implicit) -->
            <div class="flex items-start gap-2 pt-2">
                <input class="mt-1 rounded border-gray-300 text-primary focus:ring-primary" id="terms"
                    type="checkbox" />
                <label class="text-xs text-gray-500 leading-tight" for="terms">
                    Acepto los lineamientos de uso del Portal de Proyectos y el aviso de privacidad institucional de la
                    UACM.
                </label>
            </div>
            <!-- Action Button -->
            <button
                class="w-full bg-primary text-white font-bold py-4 rounded-lg shadow-lg btn-primary-hover transition-all duration-300 transform active:scale-[0.98] mt-4 flex items-center justify-center gap-2 uppercase tracking-wider text-sm"
                type="submit">
                Registrarse
                <span class="material-symbols-outlined text-base">how_to_reg</span>
            </button>
            <!-- Secondary Link -->
            <div class="pt-6 text-center border-t border-gray-100">
                <p class="text-sm text-gray-600">
                    ¿Ya tienes cuenta?
                    <a class="text-primary font-bold hover:underline ml-1" href="login.html">Iniciar Sesión</a>
                </p>
            </div>
        </form>
    </div>
    <!-- Background Decorative Elements -->
    <div class="fixed bottom-0 left-0 w-full h-1 bg-gradient-to-r from-transparent via-white/20 to-transparent"></div>
    <div class="fixed top-8 right-8 opacity-10 pointer-events-none">
        <span class="material-symbols-outlined text-[120px] text-white">school</span>
    </div>
    <div class="fixed bottom-8 left-8 opacity-10 pointer-events-none">
        <span class="material-symbols-outlined text-[120px] text-white">account_balance</span>
    </div>
    <div id="footer-root"></div>
    <script src="assets/js/main.js"></script>`n</body>

</html>
