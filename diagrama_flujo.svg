<svg width="1000" height="800" viewBox="0 0 1000 800" xmlns="http://www.w3.org/2000/svg">
    <!-- Background -->
    <rect width="1000" height="800" fill="#221310" rx="20"/>
    
    <!-- Title -->
    <text x="500" y="50" text-anchor="middle" fill="#9C2007" font-family="Lexend, sans-serif" font-size="32" font-weight="bold">Diagrama de Flujo: Portal Funcional CCH</text>
    
    <!-- Definitions for markers -->
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#701705" />
        </marker>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
            <feOffset dx="2" dy="2" result="offsetblur" />
            <feComponentTransfer>
                <feFuncA type="linear" slope="0.5" />
            </feComponentTransfer>
            <feMerge>
                <feMergeNode />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Public Section -->
    <g filter="url(#shadow)">
        <rect x="400" y="100" width="200" height="60" rx="10" fill="#701705" stroke="#9C2007" stroke-width="2"/>
        <text x="500" y="135" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="16" font-weight="bold">Inicio (index.html)</text>
    </g>

    <!-- Navigation Line -->
    <path d="M500 160 L500 220" stroke="#701705" stroke-width="2" marker-end="url(#arrowhead)"/>

    <!-- Login/Auth -->
    <g filter="url(#shadow)">
        <polygon points="500,220 620,260 500,300 380,260" fill="#341d18" stroke="#9C2007" stroke-width="2"/>
        <text x="500" y="265" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="14" font-weight="bold">Login / Registro</text>
    </g>

    <!-- Branches from Login -->
    <!-- Admin Branch -->
    <path d="M380 260 L200 260 L200 340" stroke="#701705" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="240" y="250" fill="#cc998f" font-family="Lexend, sans-serif" font-size="12">Rol: Administrador</text>

    <!-- Researcher Branch -->
    <path d="M620 260 L800 260 L800 340" stroke="#701705" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
    <text x="700" y="250" fill="#cc998f" font-family="Lexend, sans-serif" font-size="12">Rol: Investigador</text>

    <!-- Admin Section -->
    <g filter="url(#shadow)">
        <rect x="100" y="340" width="200" height="60" rx="5" fill="#9C2007" stroke="#701705" stroke-width="1"/>
        <text x="200" y="375" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="14" font-weight="bold">Admin Dashboard</text>
    </g>

    <path d="M200 400 L200 450" stroke="#701705" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <g filter="url(#shadow)">
        <rect x="80" y="450" width="240" height="120" rx="5" fill="#341d18" stroke="#9C2007" stroke-width="1"/>
        <text x="200" y="475" text-anchor="middle" fill="#cc998f" font-family="Lexend, sans-serif" font-size="12">Módulos Admin:</text>
        <text x="200" y="500" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="13">• Gestión de Usuarios</text>
        <text x="200" y="520" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="13">• Evaluación de Proyectos</text>
        <text x="200" y="540" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="13">• Reportes del Sistema</text>
    </g>

    <!-- Researcher Section -->
    <g filter="url(#shadow)">
        <rect x="700" y="340" width="200" height="60" rx="5" fill="#9C2007" stroke="#701705" stroke-width="1"/>
        <text x="800" y="375" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="14" font-weight="bold">Dashboard Usuario</text>
    </g>

    <path d="M800 400 L800 450" stroke="#701705" stroke-width="2" marker-end="url(#arrowhead)"/>

    <g filter="url(#shadow)">
        <rect x="680" y="450" width="240" height="140" rx="5" fill="#341d18" stroke="#9C2007" stroke-width="1"/>
        <text x="800" y="475" text-anchor="middle" fill="#cc998f" font-family="Lexend, sans-serif" font-size="12">Wizard de Registro:</text>
        <text x="800" y="500" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="13">Paso 1: Datos Generales</text>
        <text x="800" y="520" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="13">Paso 2: Académicos</text>
        <text x="800" y="540" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="13">Paso 3: Proyecto</text>
        <text x="800" y="560" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="13">Paso 4: Documentos</text>
    </g>

    <path d="M800 590 L800 640" stroke="#701705" stroke-width="2" marker-end="url(#arrowhead)"/>
    
    <g filter="url(#shadow)">
        <rect x="720" y="640" width="160" height="50" rx="25" fill="#701705" stroke="#9C2007" stroke-width="2"/>
        <text x="800" y="670" text-anchor="middle" fill="white" font-family="Lexend, sans-serif" font-size="14" font-weight="bold">Registro Exitoso</text>
    </g>

    <!-- Footer -->
    <text x="500" y="770" text-anchor="middle" fill="#cc998f" font-family="Lexend, sans-serif" font-size="12">© 2024 Colegio de Ciencias y Humanidades - UACM</text>
</svg>
